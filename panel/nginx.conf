# Nginx configuration for hc.ar-senik.pro
# Place at: /etc/nginx/sites-available/hc-panel

server {
    listen 80;
    server_name hc.ar-senik.pro;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hc.ar-senik.pro;

    # SSL certificates (use certbot/acme.sh)
    ssl_certificate     /etc/ssl/hc.ar-senik.pro/fullchain.pem;
    ssl_certificate_key /etc/ssl/hc.ar-senik.pro/privkey.pem;

    root /var/www/hc-panel;
    index index.html;

    # Single page — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # Proxy API calls to the backend
    location /api/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;
}
